  - Diagramming
  - Flowcharts
  - Microsoft 365
  - Visualization
apis:
  - name: Microsoft Graph Visio API
    description: >-
      REST API for accessing and interacting with Visio files stored in
      SharePoint Online and OneDrive for Business through Microsoft Graph.
      Supports reading pages, shapes, shape data, comments, and hyperlinks.
    humanURL: https://learn.microsoft.com/en-us/graph/api/resources/visio
    baseURL: https://graph.microsoft.com/v1.0
    tags:
      - Microsoft Graph
      - OneDrive
      - REST API
      - SharePoint
      - Visio Files
    properties:
      - type: Documentation
        url: https://learn.microsoft.com/en-us/graph/api/resources/visio
      - type: OpenAPI
        url: openapi/microsoft-visio-graph-api.yaml
      - type: Authentication
        url: https://learn.microsoft.com/en-us/graph/auth/
      - type: GettingStarted
        url: https://learn.microsoft.com/en-us/graph/api/resources/visio
      - type: JSONSchema
