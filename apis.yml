aid: microsoft-visio
name: Microsoft Visio
description: >-
  APIs and resources for Microsoft Visio, a diagramming and vector graphics
  application that helps visualize data-connected business process flows.
  Provides programmatic access to diagrams, pages, shapes, data items,
  comments, and hyperlinks through Microsoft Graph and JavaScript APIs.
image: https://learn.microsoft.com/en-us/graph/images/visio-logo.png
url: https://raw.githubusercontent.com/api-evangelist/microsoft-visio/refs/heads/main/apis.yml
