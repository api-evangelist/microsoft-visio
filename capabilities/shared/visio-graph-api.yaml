naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Graph Visio API"
  description: "REST API for reading Visio diagram data including pages, shapes, comments, and hyperlinks via Microsoft Graph."
  tags:
    - Microsoft Visio
    - Diagramming
    - Microsoft Graph
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MICROSOFT_GRAPH_TOKEN: MICROSOFT_GRAPH_TOKEN

capability:
  consumes:
    - type: http
      namespace: visio-graph
      baseUri: https://graph.microsoft.com/v1.0
      description: "Microsoft Graph Visio API for diagram operations."
      authentication:
        type: bearer
        token: "{{MICROSOFT_GRAPH_TOKEN}}"
      resources:
        - name: pages
          path: /me/drive/items/{item-id}/workbook/pages
          description: "Visio page operations."
          operations:
            - name: list-pages
              method: GET
              description: "List pages in a Visio document."
              inputParameters:
                - name: item-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the Visio file."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shapes
          path: /me/drive/items/{item-id}/workbook/pages/{page-id}/shapes
          description: "Shape operations."
          operations:
            - name: list-shapes
              method: GET
              description: "List shapes on a page."
              inputParameters:
                - name: item-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the Visio file."
                - name: page-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the page."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-shape
              method: GET
              description: "Get a specific shape."
              inputParameters:
                - name: item-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the Visio file."
                - name: page-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the page."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: shape-data
          path: /me/drive/items/{item-id}/workbook/pages/{page-id}/shapes/{shape-id}/shapeDataItems
          description: "Shape data item operations."
          operations:
            - name: list-shape-data-items
              method: GET
              description: "List data items for a shape."
              inputParameters:
                - name: item-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the Visio file."
                - name: page-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the page."
                - name: shape-id
                  in: path
                  type: string
                  required: true
                  description: "The ID of the shape."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9100
      namespace: visio-graph-mcp
      transport: http
      tools:
        - name: list-pages
          description: "List all pages in a Visio document."
          hints:
            readOnly: true
          call: "visio-graph.list-pages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shapes
          description: "List all shapes on a Visio page."
          hints:
            readOnly: true
          call: "visio-graph.list-shapes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-shape
          description: "Get details of a specific shape."
          hints:
            readOnly: true
          call: "visio-graph.get-shape"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shape-data-items
          description: "List data items associated with a shape."
          hints:
            readOnly: true
          call: "visio-graph.list-shape-data-items"
          outputParameters:
            - type: object
              mapping: "$."
