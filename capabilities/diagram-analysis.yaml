naftiko: "1.0.0-alpha1"

info:
  label: "Microsoft Visio Diagram Analysis"
  description: "Workflow capability for analyzing Visio diagrams including reading pages, shapes, data items, comments, and hyperlinks. Used by business analysts and IT architects to programmatically inspect diagram content."
  tags:
    - Microsoft Visio
    - Diagram Analysis
    - Visualization
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      MICROSOFT_GRAPH_TOKEN: MICROSOFT_GRAPH_TOKEN

capability:
  consumes:
    - import: visio-graph
      location: ./shared/visio-graph-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: diagram-analysis-api
      description: "Unified REST API for Visio diagram analysis."
      resources:
        - path: /v1/pages
          name: pages
          description: "Diagram page operations."
          operations:
            - method: GET
              name: list-pages
              description: "List all pages."
              call: "visio-graph.list-pages"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shapes
          name: shapes
          description: "Shape operations."
          operations:
            - method: GET
              name: list-shapes
              description: "List shapes on a page."
              call: "visio-graph.list-shapes"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/shape-data
          name: shape-data
          description: "Shape data operations."
          operations:
            - method: GET
              name: list-shape-data-items
              description: "List data items for a shape."
              call: "visio-graph.list-shape-data-items"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: diagram-analysis-mcp
      transport: http
      description: "MCP server for AI-assisted Visio diagram analysis."
      tools:
        - name: list-pages
          description: "List all pages in a Visio diagram."
          hints:
            readOnly: true
            openWorld: true
          call: "visio-graph.list-pages"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shapes
          description: "List all shapes on a diagram page."
          hints:
            readOnly: true
            openWorld: true
          call: "visio-graph.list-shapes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-shape
          description: "Get details of a specific shape."
          hints:
            readOnly: true
          call: "visio-graph.get-shape"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-shape-data-items
          description: "List data items attached to a shape."
          hints:
            readOnly: true
            openWorld: true
          call: "visio-graph.list-shape-data-items"
          outputParameters:
            - type: object
              mapping: "$."
